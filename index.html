<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Calculator Updated</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .calculator {
            width: 320px;
            background-color: #000;
            padding: 20px;
            border-radius: 40px;
        }

        .display {
            color: white;
            font-size: 80px;
            text-align: right;
            padding: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            font-weight: 300;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .gray { background-color: #a5a5a5; color: black; }
        .dark-gray { background-color: #333333; color: white; }
        .orange { background-color: #ff9f0a; color: white; }

        /* Updated Span Class for AC and Zero */
        .double-span {
            grid-column: span 2;
            width: 152px; /* Matches the width of 2 buttons + gap */
            border-radius: 40px;
            text-align: left;
            padding-left: 30px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
        <button class="gray double-span" onclick="clearDisplay()">AC</button>
        <button class="gray">%</button>
        <button class="orange" onclick="appendOperator('/')">÷</button>
        
        <button class="dark-gray" onclick="appendNumber('7')">7</button>
        <button class="dark-gray" onclick="appendNumber('8')">8</button>
        <button class="dark-gray" onclick="appendNumber('9')">9</button>
        <button class="orange" onclick="appendOperator('*')">×</button>
        
        <button class="dark-gray" onclick="appendNumber('4')">4</button>
        <button class="dark-gray" onclick="appendNumber('5')">5</button>
        <button class="dark-gray" onclick="appendNumber('6')">6</button>
        <button class="orange" onclick="appendOperator('-')">-</button>
        
        <button class="dark-gray" onclick="appendNumber('1')">1</button>
        <button class="dark-gray" onclick="appendNumber('2')">2</button>
        <button class="dark-gray" onclick="appendNumber('3')">3</button>
        <button class="orange" onclick="appendOperator('+')">+</button>
        
        <button class="dark-gray double-span" onclick="appendNumber('0')">0</button>
        <button class="dark-gray" onclick="appendNumber('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let displayValue = '0';

    function updateDisplay() {
        document.getElementById('display').innerText = displayValue;
    }

    function appendNumber(number) {
        if (displayValue === '0' && number !== '.') {
            displayValue = number;
        } else {
            displayValue += number;
        }
        updateDisplay();
    }

    function appendOperator(operator) {
        // Simple logic to prevent double operators
        const lastChar = displayValue.slice(-1);
        if (['+', '-', '*', '/'].includes(lastChar)) return;
        displayValue += operator;
        updateDisplay();
    }

    function clearDisplay() {
        displayValue = '0';
        updateDisplay();
    }

    function calculate() {
        try {
            // Using Function constructor instead of eval for slightly better practice
            displayValue = String(new Function('return ' + displayValue)());
        } catch (e) {
            displayValue = "Error";
        }
        updateDisplay();
    }
</script>

</body>
</html>
